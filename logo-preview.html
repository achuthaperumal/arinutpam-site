<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARINutpam Logo Concepts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, system-ui, sans-serif; background: #f8fafc; color: #1e293b; }
    h1 { text-align: center; padding: 2rem; font-size: 1.5rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; padding: 0 2rem 2rem; max-width: 1200px; margin: 0 auto; }
    .concept { border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
    .concept h2 { padding: 1rem; font-size: 1rem; background: #f1f5f9; text-align: center; }
    .light, .dark { padding: 2rem; display: flex; align-items: center; justify-content: center; }
    .light { background: #ffffff; }
    .dark { background: #0a0e17; }
    .concept img { max-width: 100%; height: 70px; }
    .label { text-align: center; font-size: 0.7rem; color: #94a3b8; padding: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <h1>ARINutpam Logo Concepts — Pick Your Favorite</h1>
  <div class="grid">
    <div class="concept">
      <h2>Concept 1: Vision Lens AN</h2>
      <div class="label">Light Background</div>
      <div class="light"><img src="assets/arinutpam-logo-v1.svg" alt="Concept 1"></div>
      <div class="label">Dark Background</div>
      <div class="dark"><img src="assets/arinutpam-logo-v1.svg" alt="Concept 1 Dark"></div>
    </div>
    <div class="concept">
      <h2>Concept 2: Precision Monogram</h2>
      <div class="label">Light Background</div>
      <div class="light"><img src="assets/arinutpam-logo-v2.svg" alt="Concept 2"></div>
      <div class="label">Dark Background</div>
      <div class="dark"><img src="assets/arinutpam-logo-v2.svg" alt="Concept 2 Dark"></div>
    </div>
    <div class="concept">
      <h2>Concept 3: Crosshair AN</h2>
      <div class="label">Light Background</div>
      <div class="light"><img src="assets/arinutpam-logo-v3.svg" alt="Concept 3"></div>
      <div class="label">Dark Background</div>
      <div class="dark"><img src="assets/arinutpam-logo-v3.svg" alt="Concept 3 Dark"></div>
    </div>
    <div class="concept">
      <h2>Concept 4: Neural Eye</h2>
      <div class="label">Light Background</div>
      <div class="light"><img src="assets/arinutpam-logo-v4.svg" alt="Concept 4"></div>
      <div class="label">Dark Background</div>
      <div class="dark"><img src="assets/arinutpam-logo-v4.svg" alt="Concept 4 Dark"></div>
    </div>
  </div>
</body>
</html>
