<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <!-- Concept 7: AI Vortex — bold overlapping petals with gradient fills, spin animation -->
  <defs>
    <linearGradient id="lg7a" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="lg7b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="lg7c" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="lg7d" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Vortex mark — 6 overlapping curved blades around center (46, 48) -->
  <g filter="url(#glow7)">
    <animateTransform attributeName="transform" type="rotate" from="0 46 48" to="360 46 48" dur="20s" repeatCount="indefinite"/>

    <!-- Blade 1 -->
    <path d="M46,48 C38,40 30,26 38,10 C44,14 48,30 46,48Z" fill="url(#lg7a)" opacity="0.9"/>

    <!-- Blade 2 -->
    <g transform="rotate(60, 46, 48)">
      <path d="M46,48 C38,40 30,26 38,10 C44,14 48,30 46,48Z" fill="url(#lg7b)" opacity="0.85"/>
    </g>

    <!-- Blade 3 -->
    <g transform="rotate(120, 46, 48)">
      <path d="M46,48 C38,40 30,26 38,10 C44,14 48,30 46,48Z" fill="url(#lg7c)" opacity="0.85"/>
    </g>

    <!-- Blade 4 -->
    <g transform="rotate(180, 46, 48)">
      <path d="M46,48 C38,40 30,26 38,10 C44,14 48,30 46,48Z" fill="url(#lg7d)" opacity="0.85"/>
    </g>

    <!-- Blade 5 -->
    <g transform="rotate(240, 46, 48)">
      <path d="M46,48 C38,40 30,26 38,10 C44,14 48,30 46,48Z" fill="url(#lg7a)" opacity="0.8"/>
    </g>

    <!-- Blade 6 -->
    <g transform="rotate(300, 46, 48)">
      <path d="M46,48 C38,40 30,26 38,10 C44,14 48,30 46,48Z" fill="url(#lg7c)" opacity="0.8"/>
    </g>

    <!-- Outer ring -->
    <circle cx="46" cy="48" r="38" stroke="#8b5cf6" stroke-width="1" fill="none" opacity="0.15"/>

    <!-- Inner accent ring -->
    <circle cx="46" cy="48" r="6" stroke="#c084fc" stroke-width="1" fill="none" opacity="0.4"/>

    <!-- Center dot -->
    <circle cx="46" cy="48" r="3.5" fill="#e9d5ff"/>
    <circle cx="46" cy="48" r="1.8" fill="#ffffff"/>
  </g>

  <!-- Company name -->
  <text x="100" y="42" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="32" letter-spacing="0.02em">
    <tspan fill="#8b5cf6">ARI</tspan><tspan fill="#64748b">NUTPAM</tspan>
  </text>

  <!-- Subtitle -->
  <text x="100" y="66" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="11" letter-spacing="0.25em" fill="#64748b">
    AI ENGINEERING
  </text>
</svg>
