<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <!-- Concept 3: Crosshair AN — object detection reticle -->
  <defs>
    <linearGradient id="lg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Outer crosshair circle -->
  <circle cx="46" cy="48" r="36" stroke="url(#lg3)" stroke-width="2" fill="none"/>

  <!-- Crosshair lines (extending slightly beyond circle) -->
  <line x1="46" y1="6" x2="46" y2="18" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <line x1="46" y1="78" x2="46" y2="90" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <line x1="4" y1="48" x2="16" y2="48" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <line x1="76" y1="48" x2="88" y2="48" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- Inner detection bracket corners -->
  <path d="M28,30 L28,24 L34,24" stroke="#06b6d4" stroke-width="1.5" fill="none"/>
  <path d="M58,24 L64,24 L64,30" stroke="#06b6d4" stroke-width="1.5" fill="none"/>
  <path d="M28,66 L28,72 L34,72" stroke="#8b5cf6" stroke-width="1.5" fill="none"/>
  <path d="M58,72 L64,72 L64,66" stroke="#8b5cf6" stroke-width="1.5" fill="none"/>

  <!-- A shape inside crosshair (left half) -->
  <path d="M30,70 L46,26 L54,46" stroke="#06b6d4" stroke-width="2.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- A crossbar -->
  <line x1="35" y1="54" x2="51" y2="54" stroke="#06b6d4" stroke-width="2"/>

  <!-- N shape (right half, sharing middle) -->
  <path d="M54,46 L54,70" stroke="#8b5cf6" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M54,30 L66,70" stroke="#8b5cf6" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <line x1="66" y1="70" x2="66" y2="30" stroke="#8b5cf6" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="46" cy="48" r="2" fill="url(#lg3)"/>

  <!-- Company name -->
  <text x="102" y="42" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="32" letter-spacing="0.02em">
    <tspan fill="#06b6d4">ARI</tspan><tspan fill="#64748b">NUTPAM</tspan>
  </text>

  <!-- Subtitle -->
  <text x="102" y="66" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="11" letter-spacing="0.25em" fill="#64748b">
    AI ENGINEERING
  </text>
</svg>
