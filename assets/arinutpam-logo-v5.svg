<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <!-- Concept 5: Geometric Pyramid — inspired by original triangular logo -->
  <defs>
    <linearGradient id="lg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lg5b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === TRIANGLE MARK (0-92) === -->

  <!-- Outer triangle -->
  <polygon points="46,4 4,90 88,90" stroke="url(#lg5)" stroke-width="2.5" fill="none" stroke-linejoin="round" filter="url(#glow5)"/>

  <!-- Inner parallel triangle (depth/bevel effect) -->
  <polygon points="46,13 11,85 81,85" stroke="url(#lg5)" stroke-width="0.7" fill="none" stroke-linejoin="round" opacity="0.25"/>

  <!-- Medial triangle (inverted, connecting midpoints) -->
  <polygon points="25,47 67,47 46,90" stroke="url(#lg5)" stroke-width="1.5" fill="none" stroke-linejoin="round" opacity="0.55"/>

  <!-- Inner upward triangle (creates Star of David overlap) -->
  <polygon points="46,30 22,70 70,70" stroke="url(#lg5b)" stroke-width="1.2" fill="none" stroke-linejoin="round" opacity="0.4"/>

  <!-- Medians (vertex to opposite midpoint) -->
  <line x1="46" y1="4" x2="46" y2="90" stroke="#06b6d4" stroke-width="0.6" opacity="0.18"/>
  <line x1="4" y1="90" x2="67" y2="47" stroke="#06b6d4" stroke-width="0.6" opacity="0.18"/>
  <line x1="88" y1="90" x2="25" y2="47" stroke="#8b5cf6" stroke-width="0.6" opacity="0.18"/>

  <!-- Cross-connections for crystal/faceted effect -->
  <line x1="25" y1="47" x2="70" y2="70" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
  <line x1="67" y1="47" x2="22" y2="70" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>
  <line x1="46" y1="30" x2="46" y2="70" stroke="#22d3ee" stroke-width="0.5" opacity="0.15"/>

  <!-- Central diamond accent -->
  <polygon points="46,42 38,58 46,74 54,58" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Central A letterform -->
  <path d="M40,69 L46,49 L52,69" stroke="#22d3ee" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="42.5" y1="62" x2="49.5" y2="62" stroke="#22d3ee" stroke-width="1.5"/>

  <!-- Vertex accent dots -->
  <circle cx="46" cy="4" r="2" fill="#06b6d4" opacity="0.8"/>
  <circle cx="4" cy="90" r="1.5" fill="#06b6d4" opacity="0.4"/>
  <circle cx="88" cy="90" r="1.5" fill="#8b5cf6" opacity="0.4"/>

  <!-- Midpoint accent dots -->
  <circle cx="25" cy="47" r="1.2" fill="#06b6d4" opacity="0.35"/>
  <circle cx="67" cy="47" r="1.2" fill="#8b5cf6" opacity="0.35"/>
  <circle cx="46" cy="90" r="1.2" fill="#64748b" opacity="0.3"/>

  <!-- Company name -->
  <text x="102" y="42" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="32" letter-spacing="0.02em">
    <tspan fill="#06b6d4">ARI</tspan><tspan fill="#64748b">NUTPAM</tspan>
  </text>

  <!-- Subtitle -->
  <text x="102" y="66" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="11" letter-spacing="0.25em" fill="#64748b">
    AI ENGINEERING
  </text>
</svg>
