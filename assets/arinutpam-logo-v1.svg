<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <!-- Concept 1: Vision Lens AN -->
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Outer lens circle -->
  <circle cx="45" cy="48" r="38" stroke="url(#lg1)" stroke-width="2.5" fill="none"/>

  <!-- Aperture blade hints -->
  <path d="M45,12 L52,22" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  <path d="M78,30 L68,35" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  <path d="M78,66 L68,61" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <path d="M12,30 L22,35" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  <path d="M12,66 L22,61" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <path d="M45,84 L38,74" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>

  <!-- A shape: triangle -->
  <path d="M28,72 L45,24 L62,72" stroke="#06b6d4" stroke-width="3" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- A crossbar -->
  <line x1="33" y1="56" x2="57" y2="56" stroke="#06b6d4" stroke-width="2.5"/>
  <!-- N extension from A's right leg -->
  <path d="M62,72 L62,28 L76,72" stroke="#8b5cf6" stroke-width="3" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Company name -->
  <text x="100" y="42" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="32" letter-spacing="0.02em">
    <tspan fill="#06b6d4">ARI</tspan><tspan fill="#64748b">NUTPAM</tspan>
  </text>

  <!-- Subtitle -->
  <text x="100" y="66" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="11" letter-spacing="0.25em" fill="#64748b">
    AI ENGINEERING
  </text>
</svg>
