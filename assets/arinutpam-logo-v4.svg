<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <!-- Concept 4: Neural Eye — stylized eye with AN pupil -->
  <defs>
    <linearGradient id="lg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lg4b" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Eye shape — two curved arcs -->
  <path d="M6,48 Q46,8 86,48" stroke="url(#lg4b)" stroke-width="2.5" fill="none"/>
  <path d="M6,48 Q46,88 86,48" stroke="url(#lg4b)" stroke-width="2.5" fill="none"/>

  <!-- Iris circle -->
  <circle cx="46" cy="48" r="22" stroke="url(#lg4)" stroke-width="1.5" fill="none"/>

  <!-- Neural dots on iris -->
  <circle cx="46" cy="26" r="2" fill="#06b6d4" opacity="0.6"/>
  <circle cx="64" cy="36" r="2" fill="#22d3ee" opacity="0.6"/>
  <circle cx="64" cy="60" r="2" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="46" cy="70" r="2" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="28" cy="60" r="2" fill="#06b6d4" opacity="0.6"/>
  <circle cx="28" cy="36" r="2" fill="#06b6d4" opacity="0.6"/>

  <!-- AN monogram inside the pupil -->
  <!-- A -->
  <path d="M33,64 L43,32 L53,64" stroke="#06b6d4" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="36" y1="52" x2="50" y2="52" stroke="#06b6d4" stroke-width="1.8"/>

  <!-- N sharing A's right stroke -->
  <line x1="53" y1="64" x2="53" y2="32" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="53" y1="32" x2="63" y2="64" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="63" y1="64" x2="63" y2="32" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Company name -->
  <text x="102" y="42" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="32" letter-spacing="0.02em">
    <tspan fill="#06b6d4">ARI</tspan><tspan fill="#64748b">NUTPAM</tspan>
  </text>

  <!-- Subtitle -->
  <text x="102" y="66" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="11" letter-spacing="0.25em" fill="#64748b">
    AI ENGINEERING
  </text>
</svg>
